<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Albert Oliver | Portfolio 2026</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a1a;
      color: #fff;
      font-family: 'Segoe UI', Arial, sans-serif;
      overflow: hidden;
      height: 100vh;
      user-select: none;
    }

    .carousel-wrap {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      touch-action: pan-y;
    }

    .carousel {
      display: flex;
      align-items: center;
      height: 100vh;
      gap: 2px;
    }

    .slide {
      flex: 0 0 auto;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slide img {
      height: 95vh;
      aspect-ratio: 1080 / 1350;
      object-fit: contain;
      border-radius: 2px;
      pointer-events: none;
    }

    /* Navigation arrows */
    .nav-btn {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s, opacity 0.3s;
      opacity: 0.6;
    }

    .nav-btn:hover { background: rgba(255,255,255,0.2); opacity: 1; }
    .nav-btn.prev { left: 20px; }
    .nav-btn.next { right: 20px; }
    .nav-btn:disabled { opacity: 0.15; cursor: default; }

    /* Progress dots */
    .progress {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 10;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      transition: background 0.3s, transform 0.3s;
      cursor: pointer;
    }

    .dot.active {
      background: #fff;
      transform: scale(1.3);
    }

    /* Counter */
    .counter {
      position: fixed;
      top: 20px;
      right: 24px;
      z-index: 10;
      font-size: 14px;
      letter-spacing: 2px;
      opacity: 0.5;
    }
  </style>
</head>
<body>

  <button class="nav-btn prev" onclick="go(-1)">&#10094;</button>
  <button class="nav-btn next" onclick="go(1)">&#10095;</button>

  <div class="counter"><span id="current">1</span> / 19</div>

  <div class="carousel-wrap">
    <div class="carousel" id="carousel"></div>
  </div>

  <div class="progress" id="progress"></div>

  <script>
    const total = 19;
    let idx = 0;
    let tx = 0; // current translateX value tracked manually
    let animating = false;
    const carousel = document.getElementById('carousel');
    const progress = document.getElementById('progress');

    // Build slides
    for (let i = 1; i <= total; i++) {
      const slide = document.createElement('div');
      slide.className = 'slide';
      slide.innerHTML = `<img src="${i}.png" alt="Slide ${i}" draggable="false">`;
      carousel.appendChild(slide);

      const dot = document.createElement('div');
      dot.className = 'dot' + (i === 1 ? ' active' : '');
      dot.onclick = () => snapTo(i - 1, true);
      progress.appendChild(dot);
    }

    function setTx(val, animate) {
      tx = val;
      carousel.style.transition = animate ? 'transform 0.6s cubic-bezier(0.25, 0.8, 0.25, 1)' : 'none';
      carousel.style.transform = `translateX(${tx}px)`;
    }

    function getSlideCenter(i) {
      const slide = carousel.children[i];
      return slide.offsetLeft + slide.offsetWidth / 2;
    }

    function snapTo(i, animate) {
      idx = Math.max(0, Math.min(total - 1, i));
      const offset = getSlideCenter(idx) - window.innerWidth / 2;
      setTx(-offset, animate);
      document.getElementById('current').textContent = idx + 1;
      document.querySelectorAll('.dot').forEach((d, j) => d.classList.toggle('active', j === idx));
      document.querySelector('.prev').disabled = idx === 0;
      document.querySelector('.next').disabled = idx === total - 1;
    }

    function snapToNearest(animate) {
      const viewCenter = window.innerWidth / 2;
      let closest = 0, minDist = Infinity;
      for (let i = 0; i < total; i++) {
        const dist = Math.abs(getSlideCenter(i) + tx - viewCenter);
        if (dist < minDist) { minDist = dist; closest = i; }
      }
      snapTo(closest, animate);
    }

    function go(dir) { snapTo(idx + dir, true); }

    // Keyboard
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === ' ') go(1);
      if (e.key === 'ArrowLeft') go(-1);
    });

    // Mouse wheel
    let wheelTimer = null;
    let wheelDelta = 0;
    document.addEventListener('wheel', e => {
      const d = Math.abs(e.deltaX) > Math.abs(e.deltaY) ? e.deltaX : e.deltaY;
      wheelDelta += d;
      if (!wheelTimer) {
        wheelTimer = setTimeout(() => {
          if (Math.abs(wheelDelta) > 30) go(wheelDelta > 0 ? 1 : -1);
          wheelDelta = 0;
          wheelTimer = null;
        }, 120);
      }
    }, { passive: true });

    // Touch / drag - only on the carousel wrap
    let startX = 0, startTx = 0, dragging = false;
    const wrap = document.querySelector('.carousel-wrap');

    wrap.addEventListener('pointerdown', e => {
      dragging = true;
      startX = e.clientX;
      startTx = tx;
      setTx(tx, false);
      wrap.setPointerCapture(e.pointerId);
    });

    wrap.addEventListener('pointermove', e => {
      if (!dragging) return;
      const dx = e.clientX - startX;
      setTx(startTx + dx, false);
    });

    wrap.addEventListener('pointerup', e => {
      if (!dragging) return;
      dragging = false;
      snapToNearest(true);
    });

    wrap.addEventListener('pointercancel', e => {
      if (!dragging) return;
      dragging = false;
      snapToNearest(true);
    });

    // Init - instant, no animation (aspect-ratio on imgs guarantees correct size before load)
    snapTo(0, false);
    window.addEventListener('resize', () => snapTo(idx, false));
  </script>
</body>
</html>
